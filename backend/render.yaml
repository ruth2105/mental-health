services:
  - type: web
    name: mental-health-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT backend.asgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: DATABASE_URL
        fromDatabase:
          name: mental-health-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://mental-health-frontend.vercel.app"
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: mental-health-db
    databaseName: mental_health
    user: mental_health_user
